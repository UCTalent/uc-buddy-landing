steps:
  # ─────────────────────────────────────────────────────────────────────
  # Step 1: Render .env
  #   - All non-secret vars → substitutions (easy to change in trigger UI)
  #   - Secrets only → JWT_SECRET, SANITY_API_TOKEN, ADMIN_PASSWORD,
  #     RESEND_API_KEY (fetched from Secret Manager JSON)
  # ─────────────────────────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/gcloud
    id: Render-env
    env:
      - _SECRET_JSON_NAME=${_SECRET_JSON_NAME}
      - _NEXT_PUBLIC_URL=${_NEXT_PUBLIC_URL}
      - _NEXT_PUBLIC_GOOGLE_ANALYTICS_MEASUREMENT_ID=${_NEXT_PUBLIC_GOOGLE_ANALYTICS_MEASUREMENT_ID}
    script: |
      set -e

      echo "▶ Rendering .env file..."

      ###############################
      # NON-SECRET ENV VARS
      ###############################
      python3 - <<'PY'
      import os

      lines = [
          "# ===== BASIC =====",
          "NODE_ENV=production",
          f"NEXT_PUBLIC_URL={os.environ['_NEXT_PUBLIC_URL']}",
          "",
          "# ===== GOOGLE ANALYTICS =====",
          f"NEXT_PUBLIC_GOOGLE_ANALYTICS_MEASUREMENT_ID={os.environ.get('_NEXT_PUBLIC_GOOGLE_ANALYTICS_MEASUREMENT_ID', '')}",
          "",
      ]

      with open("/workspace/.env", "w") as f:
          f.write("\n".join(lines) + "\n")
      PY

      ###############################
      # SECRET ENV VARS (from Secret Manager JSON)
      ###############################
      echo "▶ Injecting secrets from Secret Manager JSON..."

      SECRET_JSON=$(gcloud secrets versions access latest --secret="$_SECRET_JSON_NAME")
      export SECRET_JSON

      python3 - <<'PY' >> /workspace/.env
      import json, os

      data = json.loads(os.environ["SECRET_JSON"])
      for key, value in data.items():
          if isinstance(value, (dict, list)):
              value = json.dumps(value, separators=(",", ":"), ensure_ascii=False)
          print(f"{key}={value}")
      PY

      echo "✅ .env rendered successfully"
      echo "▶ Env keys loaded:"
      grep -v '^#' /workspace/.env | grep -v '^$' | cut -d'=' -f1

  # ─────────────────────────────────────────────────────────────────────
  # Step 2: Build Docker image
  #   - Read /workspace/.env → pass each var as --build-arg
  #   ⚠️  Must run AFTER Render-env because NEXT_PUBLIC_* vars are
  #       baked into the JS bundle at pnpm build time
  # ─────────────────────────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: Build
    entrypoint: bash
    args:
      - "-c"
      - |
        set -e

        echo "▶ Constructing docker build-args from .env..."

        BUILD_ARGS=()
        while IFS= read -r line || [[ -n "$line" ]]; do
          [[ -z "${line// }" ]] && continue
          [[ "$line" =~ ^[[:space:]]*# ]] && continue
          key="${line%%=*}"
          [[ -z "$key" ]] && continue
          BUILD_ARGS+=("--build-arg" "$line")
        done < /workspace/.env

        echo "▶ Building Docker image..."
        docker build --no-cache \
          "${BUILD_ARGS[@]}" \
          -t "$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA" \
          -f Dockerfile \
          .

        echo "✅ Docker build complete"

  # ─────────────────────────────────────────────────────────────────────
  # Step 3: Push image to Artifact Registry
  # ─────────────────────────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: Push
    args:
      - push
      - >-
        $_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA

  # ─────────────────────────────────────────────────────────────────────
  # Step 4: Deploy to VPS via SSH
  #   - SCP .env to VPS
  #   - Remote: docker login with SA → pull (with retry) → run new
  # ─────────────────────────────────────────────────────────────────────
  - name: "ubuntu"
    id: Deploy-to-VPS
    entrypoint: "bash"
    secretEnv: ["VM_SSH_KEY", "SA_BK_DEV", "SSH_PORT", "TAILSCALE_AUTHKEY", "VPS_KNOWN_HOST"]
    args:
      - "-c"
      - |
        set -euo pipefail
        echo "> Installing Tailscale & SSH client..."
        apt-get update -qq && apt-get install -y -q curl openssh-client

        curl -fsSL https://tailscale.com/install.sh | sh
        tailscaled --state=mem: &
        sleep 3
        tailscale up \
          --authkey="$$TAILSCALE_AUTHKEY" \
          --accept-routes \
          --hostname="cloudbuild-buddy-$$(date +%s)" \
          --timeout=30s

        # Verify Tailscale IP
        TS_OK=0
        for i in $$(seq 1 120); do
          TS_IP=$$(tailscale ip -4 2>/dev/null || true)
          if [ -n "$$TS_IP" ]; then
            echo "[OK] Tailscale connected: $$TS_IP"
            TS_OK=1; break
          fi
          sleep 1
        done
        [ "$$TS_OK" -eq 1 ] || { echo "[ERROR] Tailscale failed to get IP"; exit 1; }

        # Verify VPS reachable via Tailscale on custom SSH port
        VPS_OK=0
        for i in $$(seq 1 60); do
          if timeout 5 bash -c "echo >/dev/tcp/$_VPS_IP/$$SSH_PORT" 2>/dev/null; then
            echo "[OK] VPS reachable at $_VPS_IP:$$SSH_PORT via Tailscale"
            VPS_OK=1; break
          fi
          sleep 2
        done
        [ "$$VPS_OK" -eq 1 ] || { echo "[ERROR] Cannot reach VPS via Tailscale"; exit 1; }

        echo "▶ Setting up SSH key..."
        mkdir -p /workspace/.ssh
        chmod 700 /workspace/.ssh
        printf '%s\n' "$$VM_SSH_KEY" | tr -d '\r' > /workspace/.ssh/id_rsa
        chmod 600 /workspace/.ssh/id_rsa

        # Setup known_hosts
        printf '%s\n' "$$VPS_KNOWN_HOST" > /workspace/.ssh/known_hosts
        chmod 600 /workspace/.ssh/known_hosts

        CONTROL_PATH="/workspace/.ssh/ctl-%r@%h:%p"
        SSH_OPTS="-i /workspace/.ssh/id_rsa -o Port=$$SSH_PORT -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile=/workspace/.ssh/known_hosts -o ControlMaster=auto -o ControlPath=$$CONTROL_PATH -o ControlPersist=60"
        SSH_CMD="ssh $$SSH_OPTS $_VPS_USER@$_VPS_IP"
        SCP_CMD="scp $$SSH_OPTS"

        echo "▶ Opening persistent SSH master connection..."
        ssh -i /workspace/.ssh/id_rsa \
            -o Port=$$SSH_PORT \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile=/workspace/.ssh/known_hosts \
            -o ControlMaster=yes \
            -o ControlPath="$$CONTROL_PATH" \
            -o ControlPersist=60 \
            -Nf $_VPS_USER@$_VPS_IP

        echo "▶ Preparing VM directories..."
        $$SSH_CMD "sudo mkdir -p /opt/$_SERVICE_NAME && sudo chown -R $_VPS_USER:$_VPS_USER /opt/$_SERVICE_NAME || true"

        echo "▶ Copying .env to VM..."
        echo "$$SA_BK_DEV" > /workspace/sa.json
        $$SSH_CMD "mkdir -p /tmp/$_SERVICE_NAME"
        $$SCP_CMD /workspace/.env /workspace/sa.json $_VPS_USER@$_VPS_IP:/tmp/$_SERVICE_NAME/
        $$SSH_CMD "sudo mv /tmp/$_SERVICE_NAME/.env /opt/$_SERVICE_NAME/.env && sudo chmod 600 /opt/$_SERVICE_NAME/.env"
        $$SSH_CMD "sudo mv /tmp/$_SERVICE_NAME/sa.json /opt/$_SERVICE_NAME/sa.json && sudo chmod 600 /opt/$_SERVICE_NAME/sa.json"

        echo "▶ Creating deployment script..."
        cat << 'EOF' > /workspace/deploy.sh
        #!/bin/bash
        set -euo pipefail

        IMAGE=$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA
        IMAGE_REPO=$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$REPO_NAME/$_SERVICE_NAME
        OLD_CONTAINER="${_SERVICE_NAME}_old"
        GREEN_CONTAINER="${_SERVICE_NAME}_green"

        # Login to Artifact Registry on VPS
        cat /opt/$_SERVICE_NAME/sa.json | sudo docker login -u _json_key --password-stdin https://$_AR_HOSTNAME

        # Pull latest image
        sudo docker pull "$$IMAGE"

        # Logout immediately
        sudo docker logout $_AR_HOSTNAME 2>/dev/null || true

        echo "> Starting Green container ($$GREEN_CONTAINER)..."
        sudo docker rm -f "$$GREEN_CONTAINER" 2>/dev/null || true
        sudo docker run -d \
          --name "$$GREEN_CONTAINER" \
          --restart=always \
          --network uct_internal_net \
          --env-file /opt/$_SERVICE_NAME/.env \
          -v /opt/$_SERVICE_NAME/sa.json:/opt/$_SERVICE_NAME/sa.json:ro \
          -p $_HOST_PORT:$_PORT \
          "$$IMAGE"

        echo "> Health check Green container..."
        HEALTHY=0
        for i in $$(seq 1 120); do
          if timeout 5 sudo docker exec "$$GREEN_CONTAINER" timeout 5 sh -c "echo >/dev/tcp/127.0.0.1/$_PORT" 2>/dev/null; then
            echo "[OK] Service healthy after $$((i*2))s"
            HEALTHY=1; break
          fi
          sleep 2
        done

        if [ "$$HEALTHY" -eq 0 ]; then
          echo "[ERROR] Health check failed — rolling back!"
          sudo docker stop "$$GREEN_CONTAINER" 2>/dev/null || true
          sudo docker rm -f "$$GREEN_CONTAINER" 2>/dev/null || true
          exit 1
        fi

        echo "> Health check passed! Switching traffic..."
        sudo docker rename "$_SERVICE_NAME" "$$OLD_CONTAINER" 2>/dev/null || true
        sudo docker rename "$$GREEN_CONTAINER" "$_SERVICE_NAME"

        echo "> Waiting 35s for Nginx DNS cache to expire..."
        sleep 35

        echo "> Removing old container..."
        sudo docker stop "$$OLD_CONTAINER" 2>/dev/null || true
        sudo docker rm -f "$$OLD_CONTAINER" 2>/dev/null || true

        # Cleanup old images
        OLD_IMAGE_IDS=$$(sudo docker images --format '{{.Repository}}:{{.Tag}} {{.ID}}' | awk -v current="$$IMAGE" -v repo="$$IMAGE_REPO" '$$1 ~ ("^" repo ":") && $$1 != current { print $$2 }')

        if [ -n "$$OLD_IMAGE_IDS" ]; then
          sudo docker rmi -f $$OLD_IMAGE_IDS || true
        fi
        sudo docker image prune -f 2>/dev/null || true
        EOF

        echo "▶ Copying deploy script to VM..."
        $$SCP_CMD /workspace/deploy.sh $_VPS_USER@$_VPS_IP:/tmp/$_SERVICE_NAME/deploy.sh

        echo "▶ Executing deploy script on VM..."
        $$SSH_CMD "bash /tmp/$_SERVICE_NAME/deploy.sh"

        echo "▶ Cleaning up temp files on VM..."
        $$SSH_CMD "rm -rf /tmp/$_SERVICE_NAME"
        ssh -O exit -o ControlPath="$$CONTROL_PATH" $_VPS_USER@$_VPS_IP 2>/dev/null || true

        # Disconnect Tailscale session
        tailscale logout || true

        # Securely wipe Cloud Build workspace credentials
        shred -u /workspace/sa.json /workspace/.ssh/id_rsa /workspace/.ssh/known_hosts 2>/dev/null || rm -f /workspace/sa.json /workspace/.ssh/id_rsa /workspace/.ssh/known_hosts

        echo "✅ Deployment finished!"

# ──────────────────────────────────────────────────────────────────────
images:
  - >-
    $_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/dev-vm-ssh-key/versions/latest
      env: "VM_SSH_KEY"
    - versionName: projects/$PROJECT_ID/secrets/SA_BK_DEV/versions/latest
      env: "SA_BK_DEV"
    - versionName: projects/$PROJECT_ID/secrets/ssh-port-dev/versions/latest
      env: "SSH_PORT"
    - versionName: projects/$PROJECT_ID/secrets/TAILSCALE_AUTH_KEY_DEV/versions/latest
      env: "TAILSCALE_AUTHKEY"
    - versionName: projects/$PROJECT_ID/secrets/vps-dev-known-host/versions/latest
      env: "VPS_KNOWN_HOST"

options:
  substitutionOption: ALLOW_LOOSE
  logging: CLOUD_LOGGING_ONLY

substitutions:
  # ===== Service / Registry =====
  _SERVICE_NAME: uc-buddy
  _AR_PROJECT_ID: uctalent-dev
  _AR_REPOSITORY: cloud-run-source-deploy
  _AR_HOSTNAME: asia-southeast1-docker.pkg.dev
  _GCP_REGION: asia-southeast1

  # ===== Container Port =====
  _PORT: "3000"
  _HOST_PORT: "2510"

  # ===== VPS =====
  _VPS_IP: "100.85.11.97"
  _VPS_USER: alphaforce

  # ===== Secret Manager =====
  _SECRET_JSON_NAME: uc-buddy-env-dev

  # ===== Non-secret ENV =====
  _NEXT_PUBLIC_URL: "https://ucbuddy.ai"
  _NEXT_PUBLIC_GOOGLE_ANALYTICS_MEASUREMENT_ID: ""

tags:
  - deploy-to-vps
  - uc-buddy
